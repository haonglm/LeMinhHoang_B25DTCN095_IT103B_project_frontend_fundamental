<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>đăng ký tài khoản</title>
    <link rel="stylesheet" href="../css/register.css">
</head>
<body>
<div class="container">
    <div class="form-box">
        <h2>Đăng ký tài khoản</h2>
        <p class="subtitle">Đăng ký tài khoản để sử dụng dịch vụ</p>

        <form>
            <div class="row">
                <div class="input-group">
                    <label>Họ và tên đệm</label>
                    <input type="text" class="input" id="middleName">
                    <div class="error-message" id="middleNameError"></div>
                </div>
                <div class="input-group">
                    <label>Tên</label>
                    <input type="text" class="input" id="lastName"> 
                    <div class="error-message" id="lastNameError"></div>
                </div>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="you@company.com" class="input" id="emailInput">
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="password" class="input" id="passwordInput">
                <div class="error-message" id="passwordError"></div>
            </div>

            <div class="checkbox">
                <input type="checkbox" id="agree" class="checkbox-input">
                <label for="agree">
                    Bạn đồng ý với <a href="#">chính sách và điều khoản</a>
                </label>
            </div>

            <button type="submit">Đăng ký</button>

            <p class="login-text">
                Bạn đã có tài khoản? <a href="./index.html">Đăng nhập</a>
            </p>
        </form>
    </div>
</div>

</body>
</html>
